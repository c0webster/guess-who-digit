<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Guess Who Digit</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    color: #222;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    max-width: 500px;
    margin: 0 auto;
    padding: 12px;
    min-height: 100vh;
  }
  header {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    margin-bottom: 12px;
  }
  .seed-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1 1 100%;
  }
  .seed-label {
    font-size: 14px;
    color: #555;
  }
  #seedInput {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 15px;
    font-weight: 600;
    padding: 8px 10px;
    border: 1px solid #bbb;
    border-radius: 8px;
    background: white;
    min-height: 40px;
    flex: 1 1 auto;
    min-width: 0;
    text-transform: uppercase;
    color: #222;
  }
  #seedInput:focus {
    outline: none;
    border-color: #666;
    box-shadow: 0 0 0 2px rgba(0,0,0,0.08);
  }
  .seed-hint {
    font-size: 11px;
    color: #999;
    margin-left: 2px;
  }
  button {
    font: inherit;
    font-size: 14px;
    padding: 8px 10px;
    border: 1px solid #ccc;
    background: white;
    border-radius: 8px;
    cursor: pointer;
    min-height: 40px;
    touch-action: manipulation;
    flex: 1 1 auto;
  }
  button:active { background: #eee; }
  .banner {
    background: #fff8dc;
    border: 1px solid #e6b800;
    color: #6b4a00;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 12px;
    text-align: center;
    font-weight: 600;
    font-size: 15px;
  }
  .banner[hidden] { display: none; }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    aspect-ratio: 1 / 1;
  }
  .cell {
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
    border: 1px solid #d0d0d0;
    border-radius: 8px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: clamp(26px, 8.5vw, 42px);
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    position: relative;
    padding: 0;
    min-height: 0;
    color: #222;
  }
  .cell:active { background: #f0f0f0; }
  .cell.crossed {
    background: #e5e5e5;
    color: #999;
  }
  .cell.crossed::after {
    content: "";
    position: absolute;
    left: 8%;
    right: 8%;
    top: 50%;
    height: 2px;
    background: #888;
    transform: rotate(-12deg);
    pointer-events: none;
  }
  .cell.secret {
    border: 2px solid #e6b800;
    background: #fffbe6;
  }
  .cell.secret.crossed {
    background: #f2ead1;
  }
  .cell.secret::before {
    content: "★";
    position: absolute;
    top: 2px;
    right: 4px;
    font-size: 10px;
    color: #e6b800;
    line-height: 1;
  }
  body.picking .grid {
    outline: 2px solid #e6b800;
    outline-offset: 4px;
    border-radius: 10px;
  }
  footer {
    margin-top: 16px;
    text-align: center;
    font-size: 12px;
    color: #888;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <header>
    <label class="seed-row">
      <span class="seed-label">seed</span>
      <input id="seedInput" type="text" autocomplete="off" autocapitalize="characters" spellcheck="false" inputmode="text" aria-label="game seed (edit to join a different board)">
      <span class="seed-hint">↵ to load</span>
    </label>
    <button id="secretBtn">★ Set secret</button>
    <button id="shareBtn">Share</button>
    <button id="newBtn">New game</button>
    <button id="resetBtn">Reset</button>
  </header>
  <div class="banner" id="banner" hidden>Tap your secret character</div>
  <div class="grid" id="grid"></div>
  <footer>
    Each player picks a secret character (★) and takes turns asking yes/no questions out loud.<br>
    Tap a cell to cross it out. Share the URL so both phones get the same board.
  </footer>
<script>
  function xmur3(str) {
    let h = 1779033703 ^ str.length;
    for (let i = 0; i < str.length; i++) {
      h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    return function() {
      h = Math.imul(h ^ (h >>> 16), 2246822507);
      h = Math.imul(h ^ (h >>> 13), 3266489909);
      return (h ^= h >>> 16) >>> 0;
    };
  }
  function mulberry32(a) {
    return function() {
      let t = a += 0x6D2B79F5;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function rngFromSeed(seed) {
    return mulberry32(xmur3(seed)());
  }

  const POOL = (
    "abcdefghijklmnopqrstuvwxyz" +
    "ABCDEFGHIJKLMNOPQRSTUVWXYZ" +
    "0123456789" +
    "!@#$%^&*()_+-=[]{};:'\",.<>/?\\|~"
  ).split("");

  function generateGrid(seed) {
    const rng = rngFromSeed(seed);
    const pool = POOL.slice();
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    return pool.slice(0, 25);
  }

  function randomSeed() {
    return Math.random().toString(36).slice(2, 8).toUpperCase();
  }
  function getSeedFromURL() {
    return new URLSearchParams(location.search).get("seed");
  }
  function setSeedInURL(seed) {
    const u = new URL(location.href);
    u.searchParams.set("seed", seed);
    history.replaceState(null, "", u.toString());
  }

  const storageKey = (seed) => "gwd:" + seed;
  function loadState(seed) {
    try {
      const raw = localStorage.getItem(storageKey(seed));
      if (!raw) return { crossed: new Set(), secret: null };
      const parsed = JSON.parse(raw);
      return {
        crossed: new Set(parsed.crossed || []),
        secret: Number.isInteger(parsed.secret) ? parsed.secret : null,
      };
    } catch {
      return { crossed: new Set(), secret: null };
    }
  }
  function saveState(seed, state) {
    try {
      localStorage.setItem(storageKey(seed), JSON.stringify({
        crossed: [...state.crossed],
        secret: state.secret,
      }));
    } catch {}
  }

  let currentSeed, currentGrid, currentState, pickMode = false;

  function setPickMode(on) {
    pickMode = on;
    document.body.classList.toggle("picking", on);
    document.getElementById("banner").hidden = !on;
    document.getElementById("secretBtn").textContent =
      on ? "Cancel" : (currentState.secret === null ? "★ Set secret" : "★ Change");
  }

  function render() {
    const gridEl = document.getElementById("grid");
    gridEl.innerHTML = "";
    currentGrid.forEach((ch, i) => {
      const cell = document.createElement("button");
      const classes = ["cell"];
      if (currentState.crossed.has(i)) classes.push("crossed");
      if (currentState.secret === i) classes.push("secret");
      cell.className = classes.join(" ");
      cell.textContent = ch;
      const labelParts = [];
      if (currentState.secret === i) labelParts.push("your secret");
      if (currentState.crossed.has(i)) labelParts.push("crossed out");
      cell.setAttribute("aria-label", labelParts.length ? `${labelParts.join(", ")}: ${ch}` : ch);
      cell.addEventListener("click", () => onCellClick(i));
      gridEl.appendChild(cell);
    });
    const input = document.getElementById("seedInput");
    if (document.activeElement !== input) input.value = currentSeed;
  }

  function onCellClick(i) {
    if (pickMode) {
      currentState.secret = i;
      currentState.crossed.delete(i);
      if (navigator.vibrate) navigator.vibrate([10, 40, 10]);
      saveState(currentSeed, currentState);
      setPickMode(false);
      render();
      return;
    }
    if (currentState.crossed.has(i)) currentState.crossed.delete(i);
    else currentState.crossed.add(i);
    if (navigator.vibrate) navigator.vibrate(10);
    saveState(currentSeed, currentState);
    render();
  }

  function start(seed) {
    currentSeed = seed;
    currentGrid = generateGrid(seed);
    currentState = loadState(seed);
    setSeedInURL(seed);
    render();
    setPickMode(currentState.secret === null);
  }

  document.getElementById("newBtn").addEventListener("click", () => {
    start(randomSeed());
  });
  document.getElementById("resetBtn").addEventListener("click", () => {
    if (currentState.crossed.size === 0) return;
    currentState.crossed.clear();
    saveState(currentSeed, currentState);
    render();
  });
  document.getElementById("secretBtn").addEventListener("click", () => {
    setPickMode(!pickMode);
  });
  document.getElementById("shareBtn").addEventListener("click", async () => {
    const btn = document.getElementById("shareBtn");
    const original = btn.textContent;
    const url = location.href;
    if (navigator.share) {
      try {
        await navigator.share({ title: "Guess Who Digit", text: "Join my game", url });
        return;
      } catch (e) {
        if (e.name === "AbortError") return;
      }
    }
    try {
      await navigator.clipboard.writeText(url);
      btn.textContent = "Copied!";
    } catch {
      btn.textContent = "Copy failed";
    }
    setTimeout(() => { btn.textContent = original; }, 1500);
  });
  const seedInput = document.getElementById("seedInput");
  seedInput.addEventListener("focus", () => seedInput.select());
  seedInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); seedInput.blur(); }
  });
  seedInput.addEventListener("blur", () => {
    const trimmed = seedInput.value.trim().toUpperCase();
    if (!trimmed || trimmed === currentSeed) {
      seedInput.value = currentSeed;
      return;
    }
    start(trimmed);
  });

  start(getSeedFromURL() || randomSeed());
</script>
</body>
</html>
